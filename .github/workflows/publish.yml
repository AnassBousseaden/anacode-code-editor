name: Publish to npm

# Publishes @anacode-editor/code-editor to the npm registry when a GitHub Release is
# published. The release tag is the version (vX.Y.Z -> X.Y.Z). Publishing the
# prebuilt package means consumers install it without building from source.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Install without running the build hooks, then build dist once.
      - run: npm ci --ignore-scripts
      - run: npm run package

      # Use the release tag as the package version (strip the leading "v").
      - run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      # Scoped packages default to restricted; --access public publishes it
      # openly so consumers can install it anonymously. --ignore-scripts skips
      # the prepublishOnly rebuild (dist is already built above).
      - run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
